sources:
  - source_code: BOE
    name: Boletin Oficial del Estado
    jurisdiction: ES
    jurisdiction_level: estatal
    official_landing_url: https://www.boe.es/diario_boe/
    access_methods:
      - type: api
        url: https://www.boe.es/datosabiertos/api/boe/sumario/{date}
        status: validated
        notes: Daily summary OpenData endpoint used by the BOE adapter.
      - type: xml
        url: https://www.boe.es/datosabiertos/api/boe/sumario/{date}
        status: validated
        notes: Stored document XML URLs are fetched only through scoped artifact commands.
      - type: html
        url: https://www.boe.es/diario_boe/
        status: validated
        notes: Public landing and stored official document HTML URLs.
      - type: rss
        url: https://www.boe.es/rss/boe.php
        status: validated
        notes: Official complete BOE daily summary RSS feed linked from https://www.boe.es/rss/.
      - type: pdf
        url: https://www.boe.es/diario_boe/
        status: validated
        notes: PDF artifacts require explicit candidate or document scope.
    operational_status: metadata_adapter_validated
    mcp_support: true
    monitor_support: available
    backfill_support: validated
    evidence_adapter: true
    candidate_creation_allowed: false
    evidence_grade_allowed: false
    last_verified_at: "2026-05-24"
    limitations:
      - Evidence-grade exports remain controlled by existing review and export commands.
      - This registry does not grant permission to create candidates or download PDFs.
    notes: Tier 1 source with mature metadata, artifact, citation, and consolidated-law support.

